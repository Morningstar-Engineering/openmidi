midi_in: 3.5mm TRS Type A
midi_thru: No
phantom_power: None
midi_clock: No

midi_channel:
  instructions: |+
    To set the MIDI channel, tap the LED diode icon three times quickly.   
 
    The preset number buttons will light, press one of these to set a MIDI channel from 1-6.
instructions:

pc:
  description: |+
    Send a program change message to change presets from MIDI. 
    PC 5 will change to preset 5 bank 1, 
    PC 7 will change to preset 1 bank 2.  
    The PC number is (bank number - 1)  * 6 + preset number.
cc:
  - name: Diode - Schottky / Diode - Germanium / Diode - Silicon / Diode - LED
    value: 38
    description: Set Channel A Diode
    group:
      - name: Diode - Schottky
        description: Set Channel A Diode
        min: 0
        max: 31
        type: Parameter
      - name: Diode - Germanium
        description: Set Channel A Diode
        min: 32
        max: 63
        type: Parameter
      - name: Diode - Silicon
        description: Set Channel A Diode
        min: 64
        max: 95
        type: Parameter
      - name: Diode - LED
        description: Set Channel A Diode
        min: 96
        max: 127
        type: Parameter
  - name: Set LFO - Sine / Set LFO - Triangle / Set LFO - Square / Set LFO - Envelope
    value: 39
    description: Set Channel B LFO
    group:
      - name: Set LFO - Sine
        description: Set Channel B LFO
        min: 0
        max: 31
        type: Parameter
      - name: Set LFO - Triangle
        description: Set Channel B LFO
        min: 32
        max: 63
        type: Parameter
      - name: Set LFO - Square
        description: Set Channel B LFO
        min: 63
        max: 95
        type: Parameter
      - name: Set LFO - Envelope
        description: Set Channel B LFO
        min: 96
        max: 127
        type: Parameter
  - name: Channel B - Side 1
    value: 40
    description: Activate Side 1 of Channel B
    type: Parameter
    min: 0
    max: 63
  - name: Channel B - Side 2
    value: 10
    description: Activate Side 2 of Channel B
    type: Parameter
    min: 64
    max: 127
  - name: Channel - Bypass Both / Channel - A Active / Channel - B Active / Channel - A and B Active
    value: 41
    description: Set active/bypass of Channels A and B
    group:
      - name: Channel - Bypass Both
        description: Set active/bypass of Channels A and B
        min: 0
        max: 31
        type: Parameter
      - name: Channel - A Active
        description: Set active/bypass of Channels A and B
        min: 32
        max: 63
        type: Parameter
      - name: Channel - B Active
        description: Set active/bypass of Channels A and B
        min: 64
        max: 95
        type: Parameter
      - name: Channel - A and B Active
        description: Set active/bypass of Channels A and B
        min: 96
        max: 127
        type: Parameter
  - name: Routing - A to B / Routing - B to A
    value: 42
    description: Set routing of Channels A and B
    group:
      - name: Routing - A to B
        description: Set routing of Channels A and B
        min: 0
        max: 63
        type: Parameter
      - name: Routing - B to A
        description: Set routing of Channels A and B
        min: 64
        max: 127
        type: Parameter
  - name: Visualisation Mode
    value: 43
    description: ''
    type: Parameter
    min: 0
    max: 127
  - name: Battery Mode
    value: 44
    description: ''
    type: Parameter
    min: 0
    max: 127
  - name: Is Blending
    value: 45
    description: ''
    type: Parameter
    min: 0
    max: 127
  - name: Dump Presets
    value: 85
    description: ''
    type: Parameter
    min: 0
    max: 127
  - name: Blend Override
    value: 1
    description: 0-127 is A to B blend. Use this connected to an expression pedal or mod wheel.
    type: Parameter
    min: 0
    max: 127
