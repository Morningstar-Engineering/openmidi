        description: ''
        min: 0
        max: 0
      - name: Clock Toggle
        description: ''
        min: 64
        max: 64
      - name: Clock Start
        description: ''
        min: 127
        max: 127
  - name: Tap Tempo
    value: 15
    description: Any value sends a Tap for setting a new Tempo
    min: 0
    max: 127
  - name: BPM
    value: 16
    description: 'Sets a BPM between 40 and 240.

      For BPM between 40 and 127, send wanted value.

      For BPM above 127, send 1 first (+100) or 2 first (+200) and then send 0 - 127.  The two values add together.'
    min: 0
    max: 127
  - name: Time Signature
    value: 17
    description: 'Time Signatures can have either quarter or eighth note beats (denominator).

      Values 1 - 16 sets the numerator with a quarter beat denominator (4 = 4/4)

      Values 21 = 36 sets the numerator with an eighth beat denominator (25 = 5/8)'
    min: 1
    max: 36
  - name: USER Switch
    value: 18
    description: Simulates a USER Switch Press.  Any value.
    min: 0
    max: 127
  - name: Auto Stop Clock
    value: 19
    description: ''
    group:
      - name: 'Off'
        description: ''
        min: 0
        max: 0
      - name: 'On'
        description: ''
        min: 127
        max: 127
  - name: Cue In Count
    value: 20
    description: The number of bars to count in when using the CUE switch to start the Transport.
    min: 1
    max: 4
  - name: Cue Out Count
    value: 21
    description: The number of bars the count when using the CUE switch to stop the Transport.
    min: 1
    max: 4
