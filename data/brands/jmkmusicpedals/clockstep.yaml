  -

pc:
  description: |+

cc:
  - name: Bank Change
    value: 0
    description: 'Send before PC Command.

      1 to load Presets 128-255

      2 to load Presets 256-299

      (0 or do not send for Presets 0-127)'
    min: 0
    max: 2
  - name: Transport Start/Stop
    value: 3
    description: ''
    group:
      - name: Stop
        description: ''
        min: 0
        max: 0
      - name: Toggle
        description: ''
        min: 64
        max: 64
      - name: Start
        description: ''
        min: 127
        max: 127
  - name: CUE Start/Stop
    value: 9
    description: ''
    group:
      - name: Cue Stop
        description: ''
        min: 0
        max: 0
      - name: Cue Toggle
        description: ''
        min: 64
        max: 64
      - name: Cue Start
        description: ''
        min: 127
        max: 127
  - name: Clock Start/Stop
    value: 14
    description: ''
