cc:
  - name: EXP
    value: 11
    description: EXP pedal value
    min: 0
    max: 127
  - name: Input Gain
    value: 14
    description: Sets input gain level
    min: 0
    max: 127
  - name: DOOM
    value: 15
    description: Sets DOOM amount
    min: 0
    max: 127
  - name: Shimmer
    value: 16
    description: Sets Shimmer amount
    min: 0
    max: 127
  - name: Blend
    value: 17
    description: Sets dry/wet Blend amount
    min: 0
    max: 127
  - name: Time
    value: 18
    description: Sets the delay time
    min: 0
    max: 127
  - name: Regen
    value: 19
    description: Sets the amount of feedback
    min: 0
    max: 127
  - name: Output Gain
    value: 20
    description: Sets the output gain level
    min: 0
    max: 127
  - name: HPF
    value: 21
    description: 'Sets the amount of low-frequency

      damping'
    min: 0
    max: 127
  - name: LPF
    value: 22
    description: 'Sets the amount of high-frequency

      damping'
    min: 0
    max: 127
  - name: 'EXP: Default / EXP: Doom / EXP: Shimmer / EXP: Blend / EXP: Time / EXP: Regen / EXP: HPF / EXP: LPF / EXP: Duck'
    value: 23
    description: Maps EXP to the default Regen parameter; Maps EXP to DOOM; Maps EXP to Shimmer; Maps EXP to Blend; Maps EXP to Time; Maps EXP to Regen; Maps EXP to HPF; Maps EXP to LPF; Maps EXP to Duck Amount
    group:
      - name: 'EXP: Default'
        description: Maps EXP to the default Regen parameter
        min: 0
        max: 0
      - name: 'EXP: Doom'
        description: Maps EXP to DOOM
        min: 15
        max: 15
      - name: 'EXP: Shimmer'
        description: Maps EXP to Shimmer
        min: 30
        max: 30
      - name: 'EXP: Blend'
        description: Maps EXP to Blend
        min: 45
        max: 45
      - name: 'EXP: Time'
        description: Maps EXP to Time
        min: 60
        max: 60
      - name: 'EXP: Regen'
        description: Maps EXP to Regen
        min: 75
        max: 75
      - name: 'EXP: HPF'
        description: Maps EXP to HPF
        min: 90
        max: 90
      - name: 'EXP: LPF'
        description: Maps EXP to LPF
        min: 105
        max: 105
      - name: 'EXP: Duck'
        description: Maps EXP to Duck Amount
        min: 120
        max: 120
  - name: Duck Amt
    value: 25
    description: Sets the amount of tail ducking
    min: 0
    max: 127
