    value: 26
    description: Set Focus switch position to Left; Sets Focus switch position to Center; Sets Focus switch position to Right
    group:
      - name: Focus switch Left
        description: Set Focus switch position to Left
        min: 0
        max: 0
      - name: Focus switch Center
        description: Sets Focus switch position to Center
        min: 64
        max: 64
      - name: Focus switch Right
        description: Sets Focus switch position to Right
        min: 127
        max: 127
  - name: Duck switch Left / Duck switch Center / Duck switch Right
    value: 28
    description: Sets Duck switch position to Left; Sets Duck switch position to Center; Sets Duck switch position to Right
    group:
      - name: Duck switch Left
        description: Sets Duck switch position to Left
        min: 0
        max: 0
      - name: Duck switch Center
        description: Sets Duck switch position to Center
        min: 64
        max: 64
      - name: Duck switch Right
        description: Sets Duck switch position to Right
        min: 127
        max: 127
  - name: Hold
    value: 102
    description: 'Engage: 127 / Disengage: 0'
    min: 0
    max: 127
  - name: Bypass
    value: 103
    description: 'Engage: 127 / Disengage: 0'
    min: 0
    max: 127
