        description: ''
        min: 10
        max: 10
      - name: Triplet Sixteenth
        description: ''
        min: 11
        max: 11
      - name: Triplet Eighth
        description: ''
        min: 12
        max: 12
      - name: Triplet Half
        description: ''
        min: 13
