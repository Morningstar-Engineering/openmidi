cc:
  - name: Delay State
    value: 1
    description: Turns the delay on/off
    min: 0
    max: 127
  - name: Delay Program
    value: 2
    description: 'Selects the delay program;

      Send the corresponding MIDI CC value to select the

      delay program:

      0 - ANLG - Analog style delay

      1 - WET - Modulated analog delay

      2 - BBD - Bucket Brigade delay

      3- JET - Analog flanger delay

      4 - DOC - Wampler ‘The Doctor’

      5 - FTE - Wampler ‘Faux Tape Echo’

      6 - ETH - Wampler ‘Ethereal’ delay

      7 - MOD - Digital flanger delay

      8 - SPC - Space Echo delay

      9 - TAPE - Multi head Tape delay

      10 - DIGI - Digital delay'
    min: 0
    max: 10
  - name: Delay Time (knob)
    value: 3
    description: Emulates the Delay Time knob, 25ms to 2000ms
    min: 0
    max: 127
  - name: Delay Feedback (knob)
    value: 4
    description: Emulates the Delay Feedback knob
    min: 0
    max: 127
  - name: Tone (knob)
    value: 5
    description: Emulates the Tone knob
    min: 0
    max: 127
  - name: Mix (knob)
    value: 6
    description: ''
    group:
      - name: dry 100% + wet 0%
        description: ''
        min: 0
        max: 0
      - name: dry 100% + wet 100%
        description: ''
        min: 95
        max: 95
      - name: dry 0% + wet 100%
        description: ''
        min: 127
        max: 127
  - name: Level (knob)
    value: 7
    description: ''
    group:
      - name: -6dB
        description: ''
        min: 0
        max: 0
      - name: 0dB
        description: ''
        min: 63
        max: 63
      - name: +6dB
        description: ''
        min: 127
        max: 127
  - name: Mod Depth (knob)
    value: 8
    description: Emulates the Mod Depth knob
    min: 0
    max: 127
  - name: Mod Rate (knob)
    value: 9
    description: Emulates the Mod Rate knob
    min: 0
    max: 127
  - name: Mod Feedback (knob)
    value: 10
    description: 'Emulates the Mod Feedback knob - only affects JET

      and MOD Programs'
    min: 0
    max: 127
  - name: TAPE Mode
    value: 11
    description: 'Selects head combination for TAPE Program ->

      Value range selects heads in binary representation:

      1000 (binary) = 8 (decimal) = head 1 (quarter)

      0100 (binary) = 4 (decimal) = head 2 (dotted eighth)

      0010 (binary) = 2 (decimal) = head 3 (eighth)

      0001 (binary) = 1 (decimal) = head 4 (sixteenth)'
    min: 1
    max: 15
  - name: ETH Mode
    value: 12
    description: ''
    group:
      - name: quarter
        description: ''
        min: 0
        max: 0
      - name: quarter + quarter triplet overlay
        description: ''
        min: 1
        max: 1
      - name: quarter + dotted eighth overlay
        description: ''
        min: 2
        max: 2
      - name: quarter + dotted eighth
        description: ''
        min: 3
        max: 3
  - name: Subdivision
    value: 13
    description: ''
    group:
      - name: Quarter
        description: ''
        min: 0
        max: 0
      - name: Dotted Eighth
        description: ''
        min: 1
        max: 1
      - name: Eighth
        description: ''
