brand: Wampler Pedals
device_name: Pantheon Deluxe
midi_in: 3.5mm TRS
midi_thru: Yes
midi_clock: No
phantom_power: None

midi_channel:
  instructions: |+
    To set the MIDI Channel:
    1. Power off the device, press and hold the Left Footswitch (Channel 2 switch), and power the device on.
    2. After power up, release the switch. Both LEDs will blink.
    3. Send CC#32: value 0-15 sets Channel 1-16; value 16 sets Omni.
    Note: This CC message may be sent on any channel.

pc:
  description: |+
    The Pantheon Deluxe stores and recalls 128 presets (0-127).
    - To save: Turn on/off desired channels, hold the Channel 1 footswitch for 2 seconds (LEDs blink slowly), then send the PC# (0-127).
    - To load: Send the corresponding PC# (0-127).

cc:
  - name: 'Channel 1 Off'
    value: 0
    description: 'Sets the off state of Channel 1'
    min: 0
    max: 0
  - name: 'Channel 1 On'
    value: 0
    description: 'Sets the on state of Channel 1'
    min: 1
    max: 127
  - name: 'Channel 2 Off'
    value: 1
    description: 'Sets the off state of Channel 2'
    min: 0
    max: 0
  - name: 'Channel 2 On'
    value: 1
    description: 'Sets the on state of Channel 2'
    min: 1
    max: 127
  - name: 'Ch1 off, Ch2 off'
    value: 2
    description: 'Sets Ch1 off and Ch2 off'
    min: 0
    max: 127
  - name: 'Ch1 on, Ch2 off'
    value: 3
    description: 'Sets Ch1 on and Ch2 off'
    min: 0
    max: 127
  - name: 'Ch1 off, Ch2 on'
    value: 4
    description: 'Sets Ch1 off and Ch2 on'
    min: 0
    max: 127
  - name: 'Ch1 on, Ch2 on'
    value: 5
    description: 'Sets Ch1 on and Ch2 on'
    min: 0
    max: 127
  - name: 'Preset Increment'
    value: 16
    description: 'Increments the preset number by <value>'
    min: 0
    max: 127
  - name: 'Preset Decrement'
    value: 17
    description: 'Decrements the preset number by <value>'
    min: 0
    max: 127
  - name: 'MIDI Channel Assign'
    value: 32
    description: '0-15 = channel 1-16'
    min: 0
    max: 15
  - name: 'MIDI Omni Mode Assign'
    value: 32
    description: '16 = omni mode'
    min: 16
    max: 16