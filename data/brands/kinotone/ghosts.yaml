    max: 127
    type: variable
  - name: Ignore MIDI Clock
    value: '51'
    description: 0 = Ignore ; 1 - 127 = Listen ;
    min: 0
    max: 127
    type: variable
  - name: Ignore MIDI Transport (Start / Stop)
    value: '52'
    description: 0 = Ignore ; 1 - 127 = Listen ;
    min: 0
    max: 127
    type: variable
  - name: Clear Endless Loop
    value: '60'
    description: 0 - 64 = False ; 65 - 127 = True ;
    min: 0
    max: 127
    type: variable
  - name: Touch Footswitch
    value: '80'
    description: >-
      Endless Loop: Send 127 to advance state (rec, dub, play, dub, play, etc.)
      ;


      All other Touch Modes: 0 - 64 = Off ; 65 - 127 = On ;
    min: 0
    max: 127
    type: variable
  - name: Bypass Footswitch
    value: '81'
    description: 0 - 64 = Off ; 65 - 127 = On ;
    min: 0
    max: 127
    type: variable
