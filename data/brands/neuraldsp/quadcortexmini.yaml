brand: Neural DSP
model: Quad Cortex Mini
midi_in: USB or TRS MIDI
midi_thru: Yes (Software Toggle)
midi_clock: Yes (Send and Receive)
phantom_power: None

midi_channel:
  instructions: |+
    To access MIDI settings:
    1. Tap the Grid’s Contextual Menu at the top-right corner.
    2. Select Settings > Device > MIDI.
    3. Use the MIDI Channel dropdown to select a channel (1-16) or OMNI.

pc:
  description: |+
    Recalls a specific preset (0-127) within the currently selected preset group.
    The group is determined by the most recent CC#0 (Bank MSB) message.

cc:
  - name: 'Bank Select (MSB): Presets 0-127 / Bank Select (MSB): Presets 128-256'
    value: 0
    description: Determines preset group 0-127; Determines preset group 128-256
    group:
      - name: 'Bank Select (MSB): Presets 0-127'
        description: Determines preset group 0-127
        min: 0
        max: 0
      - name: 'Bank Select (MSB): Presets 128-256'
        description: Determines preset group 128-256
        min: 1
        max: 1
  - name: Expression Pedal 1 Position
    value: 1
    description: 'Value 0: Heel, Value 127: Toe'
    min: 0
    max: 127
  - name: Expression Pedal 2 Position
    value: 2
    description: 'Value 0: Heel, Value 127: Toe'
    min: 0
    max: 127
  - name: 'Bank Select (LSB): Factory Presets / Bank Select (LSB): My Presets / Bank Select (LSB): User Folders'
    value: 32
    description: 'Recall Factory Presets folder; Recall My Presets folder; Value 2-12: Selects User folder'
    group:
      - name: 'Bank Select (LSB): Factory Presets'
        description: Recall Factory Presets folder
        min: 0
        max: 0
      - name: 'Bank Select (LSB): My Presets'
        description: Recall My Presets folder
        min: 1
        max: 1
      - name: 'Bank Select (LSB): User Folders'
        description: 'Value 2-12: Selects User folder'
        min: 2
        max: 12
  - name: Footswitch A (Page I)
    value: 35
    description: Footswitch Press
    min: 0
    max: 127
  - name: Footswitch B (Page I)
    value: 36
    description: Footswitch Press
    min: 0
    max: 127
  - name: Footswitch C (Page I)
    value: 37
    description: Footswitch Press
    min: 0
    max: 127
  - name: Footswitch D (Page I)
    value: 38
