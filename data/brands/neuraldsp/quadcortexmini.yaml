brand: Neural DSP
model: Quad Cortex Mini
midi_in: USB or TRS MIDI
midi_thru: Yes (Software Toggle)
midi_clock: Yes (Send and Receive)
phantom_power: None

midi_channel:
  instructions: |+
    To access MIDI settings:
    1. Tap the Grid’s Contextual Menu at the top-right corner.
    2. Select Settings > Device > MIDI.
    3. Use the MIDI Channel dropdown to select a channel (1-16) or OMNI.

pc:
  description: |+
    Recalls a specific preset (0-127) within the currently selected preset group.
    The group is determined by the most recent CC#0 (Bank MSB) message.

