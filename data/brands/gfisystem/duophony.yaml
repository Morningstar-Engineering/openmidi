midi_in: DIN5
midi_thru: Yes
phantom_power: None
midi_clock: Yes

midi_channel:
  instructions: |+

instructions:

pc:
  description: |+

cc:
  - name: Loop X
    value: 14
    description: Off = 0, On = 127
    min: 0
    max: 127
  - name: Loop Y
    value: 15
    description: Off = 0, On = 127
    min: 0
    max: 127
  - name: Modes
    value: 16
    description: XY Mix = 0, Y plus X = 1, X plus Y = 2
    min: 0
    max: 2
  - name: Routing
    value: 17
    description: Parallel = 0, Series = 127
    min: 0
    max: 127
  - name: Phase X
    value: 18
    description: Normal = 0, Inverted = 127
    min: 0
    max: 127
  - name: Expression
    value: 19
    description: 0 - 127
    min: 0
    max: 127
  - name: Tap-Tempo / Bypass / Engage
    value: 20
    description: Any; Bypass = 0, Engage = 127
    group:
      - name: Tap-Tempo
        description: Any
        min: 0
        max: 127
      - name: Bypass / Engage
        description: Bypass = 0, Engage = 127
        min: 0
        max: 127
  - name: Subdivision
    value: 21
    description: "Whole.2 = 0 Dotted = 5\n Whole.4 = 1 8th Note = 6\n Whole = 2 Triplet = 7\n Half = 3 16th Note = 8\n Quarter = 4"
    min: 0
    max: 8
  - name: Mix
    value: 23
    description: 0 - 127
    min: 0
    max: 127
  - name: Mix (Left)
    value: 24
    description: 0-127
    min: 0
    max: 127
  - name: 'Mix (Right) '
    value: 25
    description: 0 - 127
    min: 0
    max: 127
  - name: Dry Level
    value: 26
    description: 0-127
    min: 0
    max: 127
  - name: Dry Level (Left)
    value: 27
    description: 0-127
    min: 0
    max: 127
  - name: Dry Level (Right)
    value: 28
    description: 0-127
    min: 0
    max: 127
  - name: LFO Speed
    value: 29
    description: 0-127
    min: 0
    max: 127
  - name: LFO Depth / Gain Y
    value: 30
    description: 0-127
    group:
      - name: LFO Depth
        description: 0-127
        min: 0
        max: 127
      - name: Gain Y
        description: 0-127
        min: 0
        max: 127
  - name: LFO
    value: 31
    description: Off = 0, On = 127
    min: 0
    max: 127
  - name: 'Gain X '
    value: 32
    description: 0-127
    min: 0
    max: 127
  - name: Mute L
    value: 34
    description: ''
    group:
      - name: mutes Left output
        description: ''
        min: 0
        max: 0
      - name: unmutes Left output (in both cases Right output will be unmuted)
        description: ''
        min: 127
        max: 127
  - name: Mute R
    value: 35
    description: ''
    group:
      - name: mutes Right output
        description: ''
        min: 0
        max: 0
      - name: unmutes Right output (in both cases Left output will be unmuted)
        description: ''
        min: 127
        max: 127
  - name: Mute LR
    value: 36
    description: ''
    group:
      - name: mutes both outputs
        description: ''
        min: 0
        max: 0
      - name: unmutes both outputs
        description: ''
        min: 127
        max: 127
  - name: 'Wet Mute L '
    value: 37
    description: ''
    group:
      - name: mutes Wet (Left)
        description: ''
        min: 0
        max: 0
      - name: unmutes Wet (Left) (in both cases Wet Right will be unmuted)
        description: ''
        min: 127
        max: 127
  - name: Wet Mute R
    value: 38
    description: ''
    group:
      - name: mutes Wet (Right)
        description: ''
        min: 0
        max: 0
      - name: unmutes Wet (Right) (in both cases Wet Left will be unmuted)
        description: ''
        min: 127
        max: 127
