brand: Electro-Harmonix
model: POG3 Polyphonic Octave Generator
midi_channel:
  instructions: ''
pc:
  description: |+
    PC Messages 1 to 100: Loads the preset associated with the MIDI PC number
    PC Message 122: Equivalent to pressing the EFFECT footswitch
    PC Message 123: Equivalent to a press on the PRESET Down footswitch
    PC Message 124: Equivalent to a press on the PRESET Up footswitch
    PC Message 125: Put the POG3 into bypass no matter the state of the POG3
    PC Message 126: Enable Effect mode no matter the state of the POG3
    PC Message 127: Toggle between loading the current preset or Live mode
    PC Message 128: Go to Live mode, no matter the state of the POG3

cc:
  - name: DETUNE slider
    value: 1
    description: The mod wheel takes control of the Detune slider.
    type: Parameter
    min: 0
    max: 127
  - name: Expression pedal MSB
    value: 4
    description: Works in conjunction with MIDI CC 36 to provide detailed control over the expression pedal function.
    type: Parameter
    min: 0
    max: 127
  - name: MASTER VOL knob
    value: 7
    description: Controls POG3’s output volume.
    type: Parameter
    min: 0
    max: 127
  - name: INPUT GAIN slider
    value: 9
    description: Controls the INPUT GAIN slider.
    type: Parameter
    min: 0
    max: 127
  - name: Expression pedal LSB
    value: 36
    description: Works in conjunction with MIDI CC 4 to provide detailed control over the expression pedal function.
    type: Parameter
    min: 0
    max: 127
  - name: Disable LEFT output / Enable LEFT output
    value: 70
    description: Disable the Left Output jack.; Enable the Left Output jack.
    group:
      - name: Disable LEFT output
        description: Disable the Left Output jack.
        min: 0
        max: 0
        type: Parameter
      - name: Enable LEFT output
        description: Enable the Left Output jack.
        min: 1
        max: 127
        type: Parameter
  - name: Disable RIGHT output / Enable RIGHT output
    value: 71
    description: Disable the Right Output jack.; Enable the Right Output jack.
    group:
      - name: Disable RIGHT output
        description: Disable the Right Output jack.
        min: 0
        max: 0
        type: Parameter
      - name: Enable RIGHT output
        description: Enable the Right Output jack.
        min: 1
        max: 127
        type: Parameter
  - name: Disable DIRECT output / Enable DIRECT output
    value: 72
    description: Disable the Direct Output jack.; Enable the Direct Output jack.
    group:
      - name: Disable DIRECT output
        description: Disable the Direct Output jack.
        min: 0
        max: 0
        type: Parameter
      - name: Enable DIRECT output
        description: Enable the Direct Output jack.
        min: 1
        max: 127
        type: Parameter
  - name: Disable EXP pedal / Enable EXP pedal
    value: 73
    description: Disable the Expression pedal.; Enable the Expression pedal.
    group:
      - name: Disable EXP pedal
        description: Disable the Expression pedal.
        min: 0
        max: 0
        type: Parameter
      - name: Enable EXP pedal
        description: Enable the Expression pedal.
        min: 1
        max: 127
        type: Parameter
  - name: Disable FOCUS / Enable FOCUS
    value: 74
    description: Disable FOCUS function.; Enable FOCUS function.
    group:
      - name: Disable FOCUS
        description: Disable FOCUS function.
        min: 0
        max: 0
        type: Parameter
      - name: Enable FOCUS
        description: Enable FOCUS function.
        min: 1
        max: 127
        type: Parameter
  - name: Disable DRY ATTACK / Enable DRY ATTACK
    value: 75
    description: Disable the DRY ATTACK button.; Enable the DRY ATTACK button (routes DRY signal through Attack effect).
    group:
      - name: Disable DRY ATTACK
        description: Disable the DRY ATTACK button.
        min: 0
        max: 0
        type: Parameter
      - name: Enable DRY ATTACK
        description: Enable the DRY ATTACK button (routes DRY signal through Attack effect).
        min: 1
        max: 127
        type: Parameter
  - name: Disable DRY FILTER / Enable DRY FILTER
    value: 76
    description: Disable the DRY FILTER button.; Enable the DRY FILTER button (routes DRY signal through Filter).
    group:
      - name: Disable DRY FILTER
        description: Disable the DRY FILTER button.
        min: 0
        max: 0
        type: Parameter
      - name: Enable DRY FILTER
        description: Enable the DRY FILTER button (routes DRY signal through Filter).
        min: 1
        max: 127
        type: Parameter
  - name: Disable DRY DETUNE / Enable DRY DETUNE
    value: 77
    description: Disable the DRY DETUNE button.; Enable the DRY DETUNE button (routes DRY signal through Detune effect).
    group:
      - name: Disable DRY DETUNE
        description: Disable the DRY DETUNE button.
        min: 0
        max: 0
        type: Parameter
      - name: Enable DRY DETUNE
        description: Enable the DRY DETUNE button (routes DRY signal through Detune effect).
        min: 1
        max: 127
        type: Parameter
  - name: Home Screen
    value: 78
    description: Choose home screen view (0-4).
    type: Parameter
    min: 0
    max: 4
  - name: EFFECT Bypass / EFFECT Enable
    value: 79
    description: Bypass the POG3 effect.; Enable the POG3 effect.
