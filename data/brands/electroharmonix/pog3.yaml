      - name: EFFECT Bypass
        description: Bypass the POG3 effect.
        min: 0
        max: 0
        type: Parameter
      - name: EFFECT Enable
        description: Enable the POG3 effect.
        min: 1
        max: 127
        type: Parameter
  - name: Save to preset
    value: 80
    description: Save current POG3 settings to preset number (CC data value + 1). E.g., value 00 saves to Preset 1.
    type: Parameter
    min: 0
    max: 99
  - name: Load Preset and Effect On
    value: 81
