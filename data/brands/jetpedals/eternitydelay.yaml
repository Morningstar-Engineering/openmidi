midi_in: TRS
midi_thru: No
phantom_power: No
midi_clock: Yes

midi_channel: 
  instructions: |+
    To set the MIDI channel:
    1. Enter Global Settings by holding the Bypass switch while applying power.
    2. Release when the Mix and Repeats LEDs turn solid White or Red.
    3. Rotate the Cntrl1 knob; the Bypass LED will flash a number of times corresponding to the channel (e.g., 4 flashes for Channel 4).
    4. Hold the Bypass switch for 3 seconds to save and exit.

midi_mapping: No

pc: 
  description: |+
    PC messages recall onboard presets:
    - PC #0: Bypass (Available from Serial #132 and up).
    - PC #1: Recalls Preset 1 (Light Blue).
    - PC #2: Recalls Preset 2 (Green).
    - PC #3: Recalls Preset 3 (Yellow).
    - PC #4: Recalls Preset 4 (Red).
    - PC #5: Recalls Preset 5 (Pink).
    - PC #6: Recalls Preset 6 (White).
    - PC #7-127: Recalls presets created by CC Snapshot (Dark Blue).

cc:
  - name: Subdivision (1/4 Note) / Subdivision (Dotted 1/8) / Subdivision (1/8 Note)
    value: 18
    description: Sets the subdivision toggle switch to 1/4 notes.; Sets the subdivision toggle switch to dotted 1/8 notes.; Sets the subdivision toggle switch to 1/8 notes.
    group:
      - name: Subdivision (1/4 Note)
        description: Sets the subdivision toggle switch to 1/4 notes.
        min: 0
        max: 42
        type: Parameter
      - name: Subdivision (Dotted 1/8)
        description: Sets the subdivision toggle switch to dotted 1/8 notes.
        min: 43
        max: 85
        type: Parameter
      - name: Subdivision (1/8 Note)
        description: Sets the subdivision toggle switch to 1/8 notes.
        min: 86
        max: 127
        type: Parameter
  - name: Mix
    value: 19
    description: Controls the Mix knob (0=CCW, 127=CW).
    type: Parameter
    min: 0
    max: 127
  - name: Repeats
    value: 20
    description: Controls the Repeats knob.
    type: Parameter
    min: 0
    max: 127
  - name: Filter
    value: 21
    description: Controls the Filter knob.
    type: Parameter
    min: 0
    max: 127
  - name: Cntrl1
    value: 22
    description: Controls the Cntrl1 knob (function varies per algorithm).
    type: Parameter
    min: 0
    max: 127
  - name: Bypass Off / Bypass On
    value: 23
    description: Turns the Bypass switch off.; Turns the Bypass switch on.
    group:
      - name: Bypass Off
        description: Turns the Bypass switch off.
        min: 0
        max: 63
        type: System
      - name: Bypass On
        description: Turns the Bypass switch on.
        min: 64
        max: 127
        type: System
  - name: Preset Switch Off / Preset Switch On
    value: 24
    description: Turns the Preset switch off.; Turns the Preset switch on.
    group:
      - name: Preset Switch Off
        description: Turns the Preset switch off.
        min: 0
        max: 63
        type: System
      - name: Preset Switch On
        description: Turns the Preset switch on.
        min: 64
        max: 127
        type: System
  - name: Increment Preset
    value: 25
    description: Increments the preset number.
    type: System
    min: 0
    max: 127
  - name: Decrement Preset
    value: 26
    description: Decrements the preset number.
    type: System
    min: 0
    max: 127
  - name: Algorithm (Tape) / Algorithm (Digital) / Algorithm (Analog) / Algorithm (Dual) / Algorithm (ESD) / Algorithm (JRD)
    value: 27
    description: Activates the Tape delay algorithm.; Activates the Digital delay algorithm.; Activates the Analog delay algorithm.; Activates the Dual delay algorithm.; Activates the ESD delay algorithm.; Activates the JET Signature delay algorithm.
    group:
      - name: Algorithm (Tape)
        description: Activates the Tape delay algorithm.
        min: 0
        max: 21
        type: Parameter
      - name: Algorithm (Digital)
        description: Activates the Digital delay algorithm.
        min: 22
        max: 44
        type: Parameter
      - name: Algorithm (Analog)
        description: Activates the Analog delay algorithm.
        min: 45
        max: 66
        type: Parameter
      - name: Algorithm (Dual)
        description: Activates the Dual delay algorithm.
        min: 67
        max: 88
        type: Parameter
      - name: Algorithm (ESD)
        description: Activates the ESD delay algorithm.
        min: 89
        max: 110
        type: Parameter
      - name: Algorithm (JRD)
        description: Activates the JET Signature delay algorithm.
        min: 111
        max: 127
        type: Parameter
  - name: CC Snapshot
    value: 28
    description: Takes a snapshot of current settings and stores them in the specified preset location (7-127).
    type: System
    min: 7
    max: 127
  - name: Kill Dry Off / Kill Dry On
    value: 29
    description: Turns off Kill Dry mode.; Turns on Kill Dry mode.
    group:
      - name: Kill Dry Off
        description: Turns off Kill Dry mode.
        min: 0
        max: 63
        type: Parameter
      - name: Kill Dry On
        description: Turns on Kill Dry mode.
        min: 64
        max: 127
        type: Parameter
