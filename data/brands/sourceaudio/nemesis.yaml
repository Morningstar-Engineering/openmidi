midi_channel:
  instructions: >
    By default, the Nemesis responds to MIDI Channel 1. The Nemesis ignores all
    MIDI messages sent to

    it that are not on its channel, with the exception of MIDI clock messages.
    The input MIDI channel for

    the Nemesis can be changed in the Hardware Options menu of the Neuro App.
    Note that the MIDI

    Input Channel is a global setting that is NOT saved per preset.
