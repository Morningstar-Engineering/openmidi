midi_in: DIN5
midi_thru: Yes
phantom_power: No
midi_clock: No

midi_channel: 
  instructions: |+
    To  set  the  MIDI  channel  on  which  the  BC-1  receives  the  commands  serves the  MIDI  CHANNEL  rotary  switch.  To  set  the  channel  it  is  needed  to  use  a  small  flat screwdriver  and  to  turn  right  or  left  the  middle  part  of  the  switch.  The  arrow-head indicates the set channel.

pc: 
  description: |+
    The BC1 responds to following PC messages:
    PC1 -> BYPASS ON
    PC2 -> BUFFER ON
    PC3 -> COMP A ON
    PC4 -> COMP B ON
    PC5 -> COMP C ON
    PC6 -> SELECTED COMP ON
cc:
  - name: COMP OFF / COMP ON
    value: 108
    description: ''
    group:
      - name: COMP OFF
        description: ''
        min: 0
        max: 63
        type: Parameter
      - name: COMP ON
        description: ''
        min: 64
        max: 127
        type: Parameter
  - name: SELECT COMP A / SELECT COMP B
    value: 109
    description: ''
    group:
      - name: SELECT COMP A
        description: ''
        min: 0
        max: 63
        type: Parameter
      - name: SELECT COMP B
        description: ''
        min: 64
        max: 127
        type: Parameter
  - name: SELECT COMP A / SELECT COMP B / SELECT COMP C
    value: 110
    description: ''
    group:
      - name: SELECT COMP A
        description: ''
        min: 1
        max: 1
        type: Parameter
      - name: SELECT COMP B
        description: ''
        min: 2
        max: 2
        type: Parameter
      - name: SELECT COMP C
        description: ''
        min: 3
        max: 3
        type: Parameter
  - name: BYPASS ON / BUFFER ON / COMP A ON / COMP B ON / COMP C ON / SEL COMP ON
    value: 111
    description: ''
    group:
      - name: BYPASS ON
        description: ''
        min: 1
        max: 1
        type: Parameter
      - name: BUFFER ON
        description: ''
        min: 2
        max: 2
        type: Parameter
      - name: COMP A ON
        description: ''
        min: 3
        max: 3
        type: Parameter
      - name: COMP B ON
        description: ''
