brand: morningstarengineering
model: mc6pro
brandName: Morningstar Engineering
modelName: MC6 Pro
device_type: midi_controller
email: tyzjames@gmail.com
url: ''
midi_channel:
  instructions: |+
    MIDI channel can be set in the Global Config menu or in the Editor.

midi_inputs:
  - name: MIDI IN
    type: 5pin
  - name: MIDI IN
    type: trs_type_a_3.5mm
  - name: USB Device
    type: usb_device
  - name: USB Host
    type: usb_host
midi_outputs:
  - name: MIDI OUT
    type: 5pin
  - name: Omniport 1
    type: trs_type_a_6.35mm
  - name: Omniport 2
    type: trs_type_a_6.35mm
  - name: Omniport 3
    type: trs_type_a_6.35mm
  - name: Omniport 4
    type: trs_type_a_6.35mm
  - name: MIDI OUT
    type: trs_type_a_3.5mm
  - name: USB Device
    type: usb_device
  - name: USB Host
    type: usb_host
midi_thru: 'Yes'
pc:
  description: Send PC#0 to PC#127 to access Banks 1 - 128.
cc:
  - name: Bank Up
    value: 0
    description: ''
    min: 0
    max: 127
  - name: Bank Down
    value: 1
    description: ''
    min: 0
    max: 127
  - name: Set Toggle (All Presets) / Set Toggle (Individual Presets)
    value: 2
    description: CC Value 0 sets Preset A, 1 sets Preset B and so on
    group:
      - name: Set Toggle (All Presets)
        description: ''
        min: 127
        max: 127
      - name: Set Toggle (Individual Presets)
        description: CC Value 0 sets Preset A, 1 sets Preset B and so on
        min: 0
        max: 11
  - name: Clear Toggle (All Presets) / Clear Toggle (Individual Presets)
    value: 3
    description: CC Value 0 clears Preset A, 1 clears Preset B and so on
    group:
      - name: Clear Toggle (All Presets)
        description: ''
        min: 127
        max: 127
      - name: Clear Toggle (Individual Presets)
        description: CC Value 0 clears Preset A, 1 clears Preset B and so on
        min: 0
        max: 11
  - name: Page Toggle
    value: 4
    description: ''
    min: 0
    max: 127
  - name: Set MIDI Clock BPM MSB
    value: 5
    description: Sets the MSB 2 bits for the MIDI Clock
    min: 0
    max: 127
  - name: Set MIDI Clock BPM LSB
    value: 6
    description: Sets the LSB 7 bits for the MIDI Clock
    min: 0
    max: 127
  - name: Looper Mode
    value: 7
    description: 0 = Toggle Looper Mode, 1 = Engage, 2 = Disengage
    min: 0
    max: 2
  - name: MIDI Clock Tap
    value: 8
    description: Engages the Tap Tempo function on the MIDI Clock
    min: 0
    max: 127
  - name: Jump to last bank
    value: 9
    description: 0 = Ignore Bank Presets, 127 = Execute Bank Presets
    min: 0
    max: 127
  - name: Engage Preset A
    value: 10
    description: Value 0 = Do Nothing, 1 = On Press, 2 = On Release, 3 = On Long Press, 4 = On Long Press Release, 5 = On Double Tap, 6 = On Double Tap Release, 7 = On Double Tap Hold, 8 = On Double Tap Release, 9 = On Release All, 10 = On Long Press Scroll
    min: 0
    max: 10
