midi_in: DIN5
midi_thru: Yes
phantom_power: None
midi_clock: No

midi_channel:
  instructions: |+
    Set the MIDI channel in the Editor or in the Global Settings on the device.
instructions:

pc:
  description:
    The ML10X has 128 presets in each of the 4 banks. PC#0 to PC#127 will recall each preset. Send CC#0, value = [0-3] to recall Banks 1-4.

