midi_in: DIN5
midi_thru: Yes
phantom_power: None
midi_clock: No

midi_channel:
  instructions: |+
    Hold down Switch E while powering up the ML5. Once the ML5 is powered up, release Switch E. The Learn button will flash quickly and continuously.
    Send a CC or PC message to the ML5 on your desired MIDI channel. The ML5 will read the message and set its MIDI channel to the first message received.

instructions:

pc:
  description:
    The ML5 has 128 presets. PC#0 to PC#127 will recall each preset.

cc:
  - name: Bypass All Loops / Engage all Loops
    value: 0
    description: ''
    group:
      - name: Bypass All Loops
        description: ''
        min: 0
        max: 63
        type: System
      - name: Engage all Loops
        description: ''
        min: 64
        max: 127
        type: System
