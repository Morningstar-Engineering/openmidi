    value: 113
    description: "Starts transition to the currently selected part in 6x6. This command is used in conjunction with CC113 values 126 and 127 to allow toggling through parts before starting the transition. This is not needed in 2x2.\t Added in 4.1.2; Selects the part according to the value number sent (part # = value #). The Aeros will not transition until it receives CC113 value 0 (shown above). . If using the BeatBuddy, the CC:102 command will change the part to the selected Aeros part immediately. If the part doesn’t exist in the song, the Aeros will ignore the command. This command cannot start the Aeros from a stopped state.; Value 101-106: Begin the transition to part (part # = value # minus 100 , so value 102 is part 2) according to the Change Part setting (Immediately/End of Measure/End of Loop). If the part doesn’t exist in the song, the Aeros will ignore the command. This allows you to send a single on-press command for changing parts. This also allows you to switch the part on\
      \ the Aeros without switching parts on the BeatBuddy (which ignores values 101-106) when they are on the same channel and being controlled by a MIDI controller. This command can start the Aeros from a stopped state. Added in 4.1.2; Switches parts immediately when receiving this command, this command does not require a CC113 value 0 command to transition. (Part # = value # - 70); Switches parts at the next end of measure (EOM) when receiving this command, this command does not require a CC113 value 0 command to transition.; Switches parts at the next end of loop (EOL) when receiving this command, this command does not require a CC113 value 0 command to transition.; Cancels any pending transition. Added in 4.1.2; In 2x2, this will start the transition to the previous part. In 6x6, this will toggle through the available parts from bottom to top. To switch to the selected part, the user must send CC113 value 0 to start the transition. Added in 4.1.2; In 2x2, this will start the transition\
