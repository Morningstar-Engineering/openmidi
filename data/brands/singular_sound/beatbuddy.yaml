    type: system
    value: 112
  - name: Transition / End Transition
    value: 113
    description: 'Starts song transition (selects the next part), 1: Starts transition, will jump to Part 1 on exit, 2: Starts transition, will jump to Part 2 on exit, 3: Starts transition, will jump to Part 3 on exit, 127: Starts transition, will jump to next part on exit. Transition will continue looping until value is changed to 0. It is possible to start a song with a transition.; Quits the transition and go to specified part'
    group:
      - name: Transition
        description: 'Starts song transition (selects the next part), 1: Starts transition, will jump to Part 1 on exit, 2: Starts transition, will jump to Part 2 on exit, 3: Starts transition, will jump to Part 3 on exit, 127: Starts transition, will jump to next part on exit. Transition will continue looping until value is changed to 0. It is possible to start a song with a transition.'
        min: 1
        max: 127
        type: system
      - name: End Transition
        description: Quits the transition and go to specified part
        min: 0
        max: 0
        type: system
