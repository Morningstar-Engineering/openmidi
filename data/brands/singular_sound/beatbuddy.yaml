    value: 110
  - name: UnPause / Pause / Pause Toggle
    value: 111
    description: UnPause the current song; Pause the current song; Toggle Pause/Unpause the current song
    group:
      - name: UnPause
        description: UnPause the current song
        min: 0
        max: 0
        type: system
      - name: Pause
        description: Pause the current song
        min: 1
        max: 1
        type: system
      - name: Pause Toggle
        description: Toggle Pause/Unpause the current song
        min: 2
        max: 127
        type: system
