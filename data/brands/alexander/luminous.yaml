midi_in: "TRS / USB"
midi_thru: ""
phantom_power: ""
midi_clock: "Yes"

midi_channel:
  instructions: |+
    Enter the Setup menu and configure M.JACK = MIDI, then set CHANNL = your desired MIDI channel. Save and exit.

pc:
