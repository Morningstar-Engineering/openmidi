---
midi_in:
  - DIN5
midi_thru: Yes
phantom_power: No
midi_clock: No
midi_channel:
  instructions: >+
    The BCC-LOUDPEDAL-IMM is fixed to MIDI Channel 8. Ensure your MIDI
    controller is configured to transmit messages on CH8.

midi_mapping:
  description: |+
    No. MIDI CC mapping is fixed and cannot be user-defined.

pc:
  description: |+
    This device does not support Program Change (PC) messages.

cc:
  - name: Select Channel 1
    value: 1
    description: Switches the amplifier to Channel 1
    type: System
    min: 0
    max: 0
  - name: Select Channel 2
    value: 1
    description: Switches the amplifier to Channel 2
    type: System
    min: 1
    max: 1
  - name: Boost Off
    value: 2
    description: Disengages the Boost circuit
    type: System
    min: 0
    max: 0
  - name: Boost On
    value: 2
    description: Engages the Boost circuit
    type: System
    min: 1
    max: 1
  - name: Reverb Off
    value: 3
    description: Disengages the Reverb circuit
    type: System
    min: 0
    max: 0
  - name: Reverb On
    value: 3
    description: Engages the Reverb circuit
    type: System
    min: 1
    max: 1
