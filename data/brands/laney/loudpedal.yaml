---
midi_in:
  - DIN5
midi_thru: Yes
phantom_power: No
midi_clock: No
midi_channel:
  instructions: >+
    The BCC-LOUDPEDAL-IMM is fixed to MIDI Channel 8. Ensure your MIDI
    controller is configured to transmit messages on CH8.

midi_mapping:
  description: |+
    No. MIDI CC mapping is fixed and cannot be user-defined.

pc:
  description: |+
    This device does not support Program Change (PC) messages.

cc:
  - name: Select Channel 1 / Select Channel 2
    value: 1
    description: Switches the amplifier to Channel 1; Switches the amplifier to Channel 2
    group:
      - name: Select Channel 1
        description: Switches the amplifier to Channel 1
        min: 0
        max: 0
        type: System
      - name: Select Channel 2
        description: Switches the amplifier to Channel 2
        min: 1
        max: 1
        type: System
  - name: Boost Off / Boost On
    value: 2
    description: Disengages the Boost circuit; Engages the Boost circuit
    group:
      - name: Boost Off
        description: Disengages the Boost circuit
        min: 0
        max: 0
        type: System
      - name: Boost On
        description: Engages the Boost circuit
        min: 1
        max: 1
        type: System
  - name: Reverb Off / Reverb On
    value: 3
    description: Disengages the Reverb circuit; Engages the Reverb circuit
    group:
      - name: Reverb Off
        description: Disengages the Reverb circuit
        min: 0
        max: 0
        type: System
      - name: Reverb On
        description: Engages the Reverb circuit
        min: 1
        max: 1
        type: System
